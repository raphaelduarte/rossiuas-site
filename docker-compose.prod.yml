services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rossiuas-web
    restart: unless-stopped
    networks:
      - easypanel
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=easypanel"
      - "traefik.http.routers.rossiuas.rule=Host(`rossiuas.dev.soberanus.online`)"
      - "traefik.http.routers.rossiuas.entrypoints=https"
      - "traefik.http.routers.rossiuas.tls=true"
      - "traefik.http.routers.rossiuas.tls.certresolver=letsencrypt"
      - "traefik.http.routers.rossiuas.service=rossiuas"
      - "traefik.http.routers.rossiuas-http.rule=Host(`rossiuas.dev.soberanus.online`)"
      - "traefik.http.routers.rossiuas-http.entrypoints=http"
      - "traefik.http.routers.rossiuas-http.middlewares=redirect-to-https@file"
      - "traefik.http.routers.rossiuas-http.service=rossiuas"
      - "traefik.http.services.rossiuas.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  easypanel:
    external: true
